<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Social Feed</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Social Feed</h1>
            <p>Share your thoughts with the world</p>
        </header>

        <!-- Create Post Form -->
        <div class="create-post">
            <h2>Create New Post</h2>
            <form id="postForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="content">What's on your mind?</label>
                    <textarea id="content" rows="3" placeholder="Write something..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Post</button>
            </form>
        </div>

        <!-- Feed -->
        <div class="feed">
            <h2>Feed</h2>
            <div id="postsContainer">
                <div class="loading">Loading posts...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/posts';

        // Load posts on page load
        document.addEventListener('DOMContentLoaded', loadPosts);

        // Handle form submission
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const content = document.getElementById('content').value.trim();
            
            if (!username || !content) {
                alert('Please fill in both fields');
                return;
            }

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, content })
                });

                if (response.ok) {
                    document.getElementById('username').value = '';
                    document.getElementById('content').value = '';
                    await loadPosts();
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (error) {
                alert('Failed to create post: ' + error.message);
            }
        });

        // Load all posts
        async function loadPosts() {
            try {
                const response = await fetch(API_BASE);
                const posts = await response.json();
                
                const container = document.getElementById('postsContainer');
                
                if (posts.length === 0) {
                    container.innerHTML = '<div class="no-posts">No posts yet. Be the first to share!</div>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="post" data-id="${post.id}">
                        <div class="post-header">
                            <span class="post-username">👤 ${post.username}</span>
                            <span class="post-time">${post.timestamp}</span>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-actions">
                            <button class="btn-like" onclick="likePost(${post.id})">
                                ❤️ <span class="like-count">${post.likes}</span>
                            </button>
                            <button class="btn-delete" onclick="deletePost(${post.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('postsContainer').innerHTML = 
                    '<div class="error">Failed to load posts. Please refresh the page.</div>';
                console.error('Error loading posts:', error);
            }
        }

        // Like a post
        async function likePost(postId) {
            try {
                const response = await fetch(`${API_BASE}/${postId}/like`, {
                    method: 'PUT'
                });
                
                if (response.ok) {
                    await loadPosts();
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (error) {
                alert('Failed to like post: ' + error.message);
            }
        }

        // Delete a post
        async function deletePost(postId) {
            if (!confirm('Are you sure you want to delete this post?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${postId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    await loadPosts();
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (error) {
                alert('Failed to delete post: ' + error.message);
            }
        }

        // Helper: Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-refresh feed every 10 seconds
        setInterval(loadPosts, 10000);
    </script>
</body>
</html>
